---
name: Snapshot

#############
## In PR, add comment `/snapshot` to trigger this workflow
## Builds all components: agent, server, frontend
## If build succeed, it will add reaction :hooray:
## If build failed, it will add reaction :confused:
#############

on:
  issue_comment:
    types:
      - created
      - edited

# Container registry: GitHub Container Registry (ghcr.io).
# Authentication uses the workflow-scoped GITHUB_TOKEN.
env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/${{ github.repository_owner }}/wirety

# Least-privilege: checkout is read-only; PR comments need write; pushing
# packages to GHCR needs `packages: write`.
permissions:
  contents: read
  packages: write
  pull-requests: write

# SECURITY: trusted-collaborator guard.
# All jobs check that the commenter is an OWNER, MEMBER, or COLLABORATOR so
# that an external contributor cannot trigger privileged builds (which use
# GITHUB_TOKEN with `packages: write`) by posting a comment on a PR that
# contains attacker-controlled code.
# The checked-out ref is still the PR branch, so the code must be treated as
# untrusted — it is only executed in the build steps and the GITHUB_TOKEN is
# scoped to the current repository's GHCR namespace.

jobs:
  helper:
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      github.event.comment.body == '/help' &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    steps:
      - name: Update comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ github.event.comment.id }}
          body: |
            ### Available commands
            Command | Description
            --- | ---
            `/help` | Get Help
            `/snapshot agent` | Build & Push agent (binaries + Docker image)
            `/snapshot server` | Build & Push server
            `/snapshot front` | Build & Push frontend
            `/snapshot helm` | Build helm chart package
            `/snapshot` | Build & Push all components

  build-helm:
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      (github.event.comment.body == '/snapshot helm' || github.event.comment.body == '/snapshot') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    steps:
      - uses: xt0rted/pull-request-comment-branch@v3
        id: comment_branch
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.comment_branch.outputs.head_ref }}
      - run: |
          echo "date=$(date -u +'%Y-%m-%dT%H-%M-%SZ')" >> "$GITHUB_OUTPUT"
        id: vars
      - uses: azure/setup-helm@v5
        with:
          version: latest
          token: ${{ secrets.GITHUB_TOKEN }} # only needed if version is 'latest'
      - name: Package and push Helm chart
        id: package_helm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          helm package ./helm --version v0.0.0-${{ steps.vars.outputs.date }}
          helm push wirety-v0.0.0-${{ steps.vars.outputs.date }}.tgz oci://${{ env.IMAGE_NAMESPACE }}/chart
      - name: Update comment
        if: always()
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ github.event.comment.id }}
          body: |
            **Helm chart package:**
            oci://${{ env.IMAGE_NAMESPACE }}/chart/wirety:v0.0.0-${{ steps.vars.outputs.date }}
          reactions: hooray
          reactions-edit-mode: replace

  build-agent:
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      (github.event.comment.body == '/snapshot agent' || github.event.comment.body == '/snapshot') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    steps:
      - uses: xt0rted/pull-request-comment-branch@v3
        id: comment_branch
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.comment_branch.outputs.head_ref }}
      - run: |
          echo "date=$(date -u +'%Y-%m-%dT%H-%M-%SZ')" >> "$GITHUB_OUTPUT"
        id: vars
      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.25.0'

      - name: Build Go binaries
        id: build_binaries
        run: |
          cd agent
          mkdir -p ../build

          # Build for multiple platforms
          GOOS=linux GOARCH=amd64 go build -o ../build/wirety-agent-linux-amd64 ./cmd/agent
          GOOS=linux GOARCH=arm64 go build -o ../build/wirety-agent-linux-arm64 ./cmd/agent
          GOOS=darwin GOARCH=amd64 go build -o ../build/wirety-agent-darwin-amd64 ./cmd/agent
          GOOS=darwin GOARCH=arm64 go build -o ../build/wirety-agent-darwin-arm64 ./cmd/agent
          GOOS=windows GOARCH=amd64 go build -o ../build/wirety-agent-windows-amd64.exe ./cmd/agent

          # Create checksums
          cd ../build
          sha256sum * > checksums.txt
          ls -lh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Agent Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./agent
          file: ./agent/Dockerfile.multiarch
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/agent:${{ steps.vars.outputs.date }}-SNAPSHOT
          build-args: |
            VERSION=${{ steps.vars.outputs.date }}-SNAPSHOT
            BUILDTIME=${{ steps.vars.outputs.date }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wirety-agent-${{ steps.vars.outputs.date }}-SNAPSHOT
          path: build/*
          retention-days: 30

      - name: Update comment
        if: always()
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ github.event.comment.id }}
          body: |
            **Agent snapshot:**

            Docker Image:
            ```
            ${{ env.IMAGE_NAMESPACE }}/agent:${{ steps.vars.outputs.date }}-SNAPSHOT
            ```

            Binaries: [Download from Actions artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - wirety-agent-linux-amd64
            - wirety-agent-linux-arm64
            - wirety-agent-darwin-amd64
            - wirety-agent-darwin-arm64
            - wirety-agent-windows-amd64.exe
            - checksums.txt
          reactions: hooray
          reactions-edit-mode: replace

  build-server:
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      (github.event.comment.body == '/snapshot server' || github.event.comment.body == '/snapshot') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    steps:
      - uses: xt0rted/pull-request-comment-branch@v3
        id: comment_branch
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.comment_branch.outputs.head_ref }}
      - run: |
          echo "date=$(date -u +'%Y-%m-%dT%H-%M-%SZ')" >> "$GITHUB_OUTPUT"
        id: vars
      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.25.0'
      - uses: ko-build/setup-ko@v0.7
      - name: Build and Push Server
        id: build_server
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | ko login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          cd server
          KO_DOCKER_REPO=${{ env.IMAGE_NAMESPACE }}/server ko publish ./cmd --bare --tags ${{ steps.vars.outputs.date }}-SNAPSHOT --platform=all
      - name: Update comment
        if: always()
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ github.event.comment.id }}
          body: |
            **Server snapshot:**
            ```
            ${{ env.IMAGE_NAMESPACE }}/server:${{ steps.vars.outputs.date }}-SNAPSHOT
            ```
          reactions: hooray
          reactions-edit-mode: replace

  build-frontend:
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      (github.event.comment.body == '/snapshot front' || github.event.comment.body == '/snapshot') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    steps:
      - uses: xt0rted/pull-request-comment-branch@v3
        id: comment_branch
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.comment_branch.outputs.head_ref }}
      - run: |
          echo "date=$(date -u +'%Y-%m-%dT%H-%M-%SZ')" >> "$GITHUB_OUTPUT"
        id: vars
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Frontend
        id: build_frontend
        run: |
          docker build -t ${{ env.IMAGE_NAMESPACE }}/front:${{ steps.vars.outputs.date }}-SNAPSHOT ./front
          docker push ${{ env.IMAGE_NAMESPACE }}/front:${{ steps.vars.outputs.date }}-SNAPSHOT
      - name: Update comment
        if: always()
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ github.event.comment.id }}
          body: |
            **Frontend snapshot:**
            ```
            ${{ env.IMAGE_NAMESPACE }}/front:${{ steps.vars.outputs.date }}-SNAPSHOT
            ```
          reactions: hooray
          reactions-edit-mode: replace

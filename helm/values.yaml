server:
  env: []
    # Authentication — set AUTH_ENABLED to "true" to enable OIDC.
    # When AUTH_ENABLED is "false" the server uses simple password auth.
    # Set AUTH_PASSWORD to fix the admin password; if unset a random one is
    # generated and printed to the server logs on each restart.
    # AUTH_ENABLED: "false"
    # AUTH_ISSUER_URL: ""
    # AUTH_CLIENT_ID: ""
    # AUTH_CLIENT_SECRET: ""
    # AUTH_JWKS_CACHE_TTL: "3600"
    # AUTH_PASSWORD: ""
    # Database — DB_DSN is used when DB_ENABLED is "true".
    # When postgres.enabled=true this is automatically overridden by the
    # subchart service name in the deployment template.
    # DB_ENABLED: "true"
    # DB_DSN: ""
    # HTTP server
    # HTTP_PORT: "8080"
    # CORS — prefer CORS_ORIGIN; ALLOWED_ORIGIN is the legacy alias.
    # Accepts a comma-separated list of origins (default: "*" for dev).
    # CORS_ORIGIN: "https://app.example.com,https://admin.example.com"
    # Audit log — set to "true" to emit JSON audit events to stdout.
    # AUDIT_LOG: "false"
  envFrom: []
  image:
    pullPolicy: IfNotPresent
    repository: rg.fr-par.scw.cloud/wirety/server
    tag: 2026-04-02T14-18-21Z-SNAPSHOT
  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /api/v1/health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  service:
    port: 8080
    type: ClusterIP

# HTTPRoute (Gateway API) — disabled by default.
# Requires a Gateway API controller (e.g. Envoy Gateway, Istio, Contour).
#
# Two independent HTTPRoutes are provided:
#
#   public  — attached to your internet-facing Gateway.
#             Expose only the paths you explicitly list in public.rules.
#             Admin paths should never appear here.
#
#   private — attached to your VPN/internal Gateway.
#             Full access to all routes including admin endpoints.
#
# Typical setup:
#   - Point your public DNS (wirety.example.com) at the public Gateway.
#   - Point your internal DNS (wirety.corp) at your VPN/internal Gateway.
#   - Uncomment the rules you need in each section below.

httpRoute:
  public:
    enabled: false
    annotations: {}
    # parentRefs:
    #   - name: public-gateway
    #     namespace: gateway-system
    parentRefs: []
    # hostnames:
    #   - wirety.example.com
    hostnames: []
    # rules — uncomment the paths you want reachable from the internet.
    #
    # ── Minimum required for the login page ──────────────────────────────────
    # rules:
    #   # Health check
    #   - matches:
    #       - path:
    #           type: Exact
    #           value: /api/v1/health
    #     backend: server
    #
    #   # Authentication: OIDC exchange, simple login/logout, provider config
    #   - matches:
    #       - path:
    #           type: PathPrefix
    #           value: /api/v1/auth/
    #     backend: server
    #
    #   # Frontend SPA (catch-all — keep last)
    #   - matches:
    #       - path:
    #           type: PathPrefix
    #           value: /
    #     backend: frontend
    #
    # ── Optional: agent connectivity (needed if agents reach the server over
    #    the internet rather than through the private network) ────────────────────────────
    #
    #   # Agent WebSocket connections
    #   - matches:
    #       - path:
    #           type: PathPrefix
    #           value: /api/v1/ws
    #     backend: server
    #
    #   # Agent endpoint resolution
    #   - matches:
    #       - path:
    #           type: PathPrefix
    #           value: /api/v1/agent/
    #     backend: server
    #
    # ── Optional: let users fetch their WireGuard peer config from the internet
    #    All requests still require authentication; admin sub-paths within
    #    /api/v1/networks/ return 403 to non-admin callers. ──────────────────
    #
    #   # Current-user info and API tokens
    #   - matches:
    #       - path:
    #           type: PathPrefix
    #           value: /api/v1/users/me
    #     backend: server
    #
    #   # Network listing and peer config download
    #   # (GET /api/v1/networks/{id}/peers/{peerId}/config)
    #   - matches:
    #       - path:
    #           type: PathPrefix
    #           value: /api/v1/networks/
    #         method: GET
    #     backend: server
    rules: []

  private:
    enabled: false
    annotations: {}
    # parentRefs:
    #   - name: private-gateway
    #     namespace: gateway-system
    parentRefs: []
    # hostnames:
    #   - wirety.corp
    hostnames: []
    # rules — full access; all paths including admin routes.
    #
    # rules:
    #   # All API routes (includes admin-only endpoints)
    #   - matches:
    #       - path:
    #           type: PathPrefix
    #           value: /api/
    #     backend: server
    #
    #   # MCP server (AI tool integration)
    #   - matches:
    #       - path:
    #           type: PathPrefix
    #           value: /mcp
    #     backend: server
    #
    #   # Frontend SPA (catch-all — keep last)
    #   - matches:
    #       - path:
    #           type: PathPrefix
    #           value: /
    #     backend: frontend
    rules: []

ingress:
  className: traefik
  enabled: false
  hosts:
  - host: wirety-personal.pewty.fr
    paths:
    - backend: server
      path: /api
      pathType: Prefix
    - backend: frontend
      path: /
      pathType: Prefix
  tls: []

# PostgreSQL subchart (CloudPirates).
# When enabled, a PostgreSQL StatefulSet is deployed alongside Wirety and
# DB_DSN is automatically set to point at it.  Disable this if you bring
# your own database and set server.env.DB_DSN manually.
postgres:
  enabled: true
  auth:
    username: wirety
    password: wirety
    database: wirety
  persistence:
    enabled: true
    size: 8Gi

# extraObjects — list of arbitrary Kubernetes manifests to render alongside
# the chart resources.  Each item is passed through `tpl`, so you can use
# Helm template expressions such as {{ .Release.Name }}.
#
# Example:
# extraObjects:
#   - apiVersion: external-secrets.io/v1beta1
#     kind: ExternalSecret
#     metadata:
#       name: "{{ .Release.Name }}-admin-password"
#     spec:
#       refreshInterval: 1h
#       secretStoreRef:
#         name: my-store
#         kind: SecretStore
#       target:
#         name: "{{ .Release.Name }}-admin-password"
#       data:
#         - secretKey: AUTH_PASSWORD
#           remoteRef:
#             key: wirety/admin-password
extraObjects: []

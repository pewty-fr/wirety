
nameOverride: ""
nodeSelector: {}
podAnnotations: {}
podSecurityContext: {}
replicaCount: 1
securityContext: {}
affinity: {}
tolerations: []

serviceAccount:
  annotations: {}
  create: true
  name: ""

frontend:
  # env:
  #   REACT_APP_API_URL: "/api"
  image:
    pullPolicy: IfNotPresent
    repository: rg.fr-par.scw.cloud/wirety/front
    tag: 2026-04-02T13-07-53Z-SNAPSHOT
  # livenessProbe:
  #   httpGet:
  #     path: /
  #     port: http
  #   initialDelaySeconds: 5
  #   periodSeconds: 10
  # readinessProbe:
  #   httpGet:
  #     path: /
  #     port: http
  #   initialDelaySeconds: 3
  #   periodSeconds: 5
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  service:
    port: 8080
    type: ClusterIP
fullnameOverride: ""
imagePullSecrets: []

server:
  env: []
    # Authentication — set AUTH_ENABLED to "true" to enable OIDC.
    # When AUTH_ENABLED is "false" the server uses simple password auth.
    # Set AUTH_PASSWORD to fix the admin password; if unset a random one is
    # generated and printed to the server logs on each restart.
    # AUTH_ENABLED: "false"
    # AUTH_ISSUER_URL: ""
    # AUTH_CLIENT_ID: ""
    # AUTH_CLIENT_SECRET: ""
    # AUTH_JWKS_CACHE_TTL: "3600"
    # AUTH_PASSWORD: ""
    # Database — DB_DSN is used when DB_ENABLED is "true".
    # When postgres.enabled=true this is automatically overridden by the
    # subchart service name in the deployment template.
    # DB_ENABLED: "true"
    # DB_DSN: ""
    # HTTP server
    # HTTP_PORT: "8080"
    # CORS — prefer CORS_ORIGIN; ALLOWED_ORIGIN is the legacy alias.
    # CORS_ORIGIN: ""
    # Audit log — set to "true" to emit JSON audit events to stdout.
    # AUDIT_LOG: "false"
  envFrom: []
  image:
    pullPolicy: IfNotPresent
    repository: rg.fr-par.scw.cloud/wirety/server
    tag: 2026-04-02T13-07-45Z-SNAPSHOT
  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /api/v1/health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  service:
    port: 8080
    type: ClusterIP

# HTTPRoute (Gateway API) — disabled by default.
# Enable this as an alternative or complement to the Ingress above.
# Requires a Gateway API controller (e.g. Envoy Gateway, Istio, Contour).
httpRoute:
  enabled: false
  annotations: {}
  # parentRefs:
  #   - name: my-gateway
  #     namespace: gateway-system
  parentRefs: []
  # hostnames:
  #   - wirety.example.com
  hostnames: []
  # rules defines which paths are forwarded to which backend (server or frontend).
  # Each rule maps a set of path matches to one Wirety backend service.
  # Example:
  # rules:
  #   - matches:
  #       - path:
  #           type: PathPrefix
  #           value: /api
  #     backend: server
  #   - matches:
  #       - path:
  #           type: PathPrefix
  #           value: /
  #     backend: frontend
  rules: []

ingress:
  className: traefik
  enabled: false
  hosts:
  - host: wirety-personal.pewty.fr
    paths:
    - backend: server
      path: /api
      pathType: Prefix
    - backend: frontend
      path: /
      pathType: Prefix
  tls: []

# PostgreSQL subchart (CloudPirates).
# When enabled, a PostgreSQL StatefulSet is deployed alongside Wirety and
# DB_DSN is automatically set to point at it.  Disable this if you bring
# your own database and set server.env.DB_DSN manually.
postgres:
  enabled: true
  auth:
    username: wirety
    password: wirety
    database: wirety
  persistence:
    enabled: true
    size: 8Gi

# extraObjects — list of arbitrary Kubernetes manifests to render alongside
# the chart resources.  Each item is passed through `tpl`, so you can use
# Helm template expressions such as {{ .Release.Name }}.
#
# Example:
# extraObjects:
#   - apiVersion: external-secrets.io/v1beta1
#     kind: ExternalSecret
#     metadata:
#       name: "{{ .Release.Name }}-admin-password"
#     spec:
#       refreshInterval: 1h
#       secretStoreRef:
#         name: my-store
#         kind: SecretStore
#       target:
#         name: "{{ .Release.Name }}-admin-password"
#       data:
#         - secretKey: AUTH_PASSWORD
#           remoteRef:
#             key: wirety/admin-password
extraObjects: []

{{/*
  Two HTTPRoute resources are generated when enabled:

  PUBLIC  — attached to your internet-facing Gateway.
            Configure rules in httpRoute.public.rules (see values.yaml).

  PRIVATE — attached to your VPN/internal Gateway.
            Configure rules in httpRoute.private.rules (see values.yaml).

  Admin-only API paths (require the "administrator" role on the server):
    GET/PUT  /api/v1/users                        list users / bulk update
    GET/PUT  /api/v1/users/defaults               default network permissions
    GET/PUT/DELETE /api/v1/users/{id}             manage individual users
    POST     /api/v1/networks                     create network
    PUT/DELETE /api/v1/networks/{id}              update / delete network
    *        /api/v1/networks/{id}/acl            access-control list
    *        /api/v1/networks/{id}/security/config
    *        /api/v1/networks/{id}/groups/*
    *        /api/v1/networks/{id}/policies/*
    *        /api/v1/networks/{id}/routes/*
    GET      /api/v1/networks/{id}/dns
*/}}

{{/* ── PUBLIC HTTPRoute ─────────────────────────────────────────────────────── */}}
{{- if .Values.httpRoute.public.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "wirety.fullname" . }}-public
  labels:
    {{- include "wirety.labels" . | nindent 4 }}
    wirety.io/visibility: public
  {{- with .Values.httpRoute.public.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.httpRoute.public.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.httpRoute.public.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.httpRoute.public.rules }}
    - matches:
        {{- toYaml .matches | nindent 8 }}
      filters:
        {{- toYaml .filters | nindent 8 }}
      backendRefs:
        - name: {{ include "wirety.fullname" $ }}-{{ .backend }}
          port: {{ if eq .backend "server" }}{{ $.Values.server.service.port }}{{ else }}{{ $.Values.frontend.service.port }}{{ end }}
    {{- end }}
{{- end }}

---
{{/* ── PRIVATE HTTPRoute ────────────────────────────────────────────────────── */}}
{{- if .Values.httpRoute.private.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "wirety.fullname" . }}-private
  labels:
    {{- include "wirety.labels" . | nindent 4 }}
    wirety.io/visibility: private
  {{- with .Values.httpRoute.private.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.httpRoute.private.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.httpRoute.private.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.httpRoute.private.rules }}
    - matches:
        {{- toYaml .matches | nindent 8 }}
      filters:
        {{- toYaml .filters | nindent 8 }}
      backendRefs:
        - name: {{ include "wirety.fullname" $ }}-{{ .backend }}
          port: {{ if eq .backend "server" }}{{ $.Values.server.service.port }}{{ else }}{{ $.Values.frontend.service.port }}{{ end }}
    {{- end }}
{{- end }}

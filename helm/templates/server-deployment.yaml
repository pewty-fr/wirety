{{- /*
Build the Postgres DSN from the subchart when postgres.enabled=true.
The CloudPirates postgres chart names its Service after the release + chart
name, yielding "{{ .Release.Name }}-postgres".
*/}}
{{- define "wirety.postgresDSN" -}}
{{- $host := printf "%s-postgres" .Release.Name -}}
{{- $user := .Values.postgres.auth.username | default "wirety" -}}
{{- $pass := .Values.postgres.auth.password | default "wirety" -}}
{{- $db   := .Values.postgres.auth.database | default "wirety" -}}
{{- printf "postgres://%s:%s@%s:5432/%s?sslmode=disable" $user $pass $host $db -}}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wirety.fullname" . }}-server
  labels:
    {{- include "wirety.server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "wirety.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "wirety.server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "wirety.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: server
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.server.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.server.env.HTTP_PORT | int }}
          protocol: TCP
        env:
        {{- range $key, $value := .Values.server.env }}
        {{- /* Skip DB_DSN here; it is handled below so the subchart can override it. */}}
        {{- if ne $key "DB_DSN" }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        {{- if .Values.postgres.enabled }}
        - name: DB_DSN
          value: {{ include "wirety.postgresDSN" . | quote }}
        {{- else if .Values.server.env.DB_DSN }}
        - name: DB_DSN
          value: {{ .Values.server.env.DB_DSN | quote }}
        {{- end }}
        {{- with .Values.server.envFrom }}
        envFrom:
          {{- toYaml . | nindent 12 }}
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.server.livenessProbe | nindent 12 }}
        readinessProbe:
          {{- toYaml .Values.server.readinessProbe | nindent 12 }}
        resources:
          {{- toYaml .Values.server.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
